http:
  # Redirect all HTTP to HTTPS (allows ACME http-01 challenge to run first
  # because acme-http@internal has higher router priority)
  routers:
    http-to-https:
      entryPoints:
        - web
      rule: "HostRegexp(`^.+$`)"
      middlewares:
        - redirect-to-https
      service: noop@internal
      priority: 1

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  serversTransports:
    portainer-transport:
      insecureSkipVerify: true
